name: version-bump

# #18 (B) — auto-bump the edge software version on every push to main (V7).
# SoT = git tags (vX.Y). The bump RECORDS the new version by creating + pushing an
# annotated tag — NO write-back to main (no pyproject edit), so it can never loop.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version + record it as a tag
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          # Idempotency: if HEAD already carries a vX.Y tag (e.g. a "Re-run all jobs" on an
          # already-bumped push), do nothing — never mint a phantom version on re-run.
          if git describe --exact-match --match 'v[0-9]*.[0-9]*' --tags HEAD >/dev/null 2>&1; then
            echo "HEAD already versioned ($(git describe --exact-match --tags HEAD)) — skipping"
            exit 0
          fi
          LATEST=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$LATEST" ]; then
            NEXT="0.1"; RANGE="<seed>"; REASON="no tag yet → V5 start 0.1 (seed)"
          else
            v=${LATEST#v}; X=${v%%.*}; Y=${v#*.}
            # BEFORE..AFTER only for a genuine fast-forward push; on a force-push /
            # rewritten history (BEFORE not an ancestor of AFTER) fall back to since-last-tag.
            if [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
               && git rev-parse --quiet --verify "${BEFORE}^{commit}" >/dev/null 2>&1 \
               && git merge-base --is-ancestor "$BEFORE" "$AFTER"; then
              RANGE="${BEFORE}..${AFTER}"
            else
              RANGE="${LATEST}..${AFTER}"
            fi
            SUBJECTS=$(git log --format='%s' "$RANGE" || true)
            BODIES=$(git log --format='%b' "$RANGE" || true)
            # HIGHEST signal wins (max-over-range): any feat OR breaking marker → X (reset Y);
            # else → Y (fix/perf/refactor/docs/chore AND the no-signal default, V6).
            if echo "$SUBJECTS" | grep -qiE '^feat(\([^)]+\))?!?:' \
               || echo "$SUBJECTS" | grep -qiE '^[a-z]+(\([^)]+\))?!:' \
               || echo "$BODIES"  | grep -qiE 'BREAKING[ -]CHANGE'; then
              X=$((X + 1)); Y=0; REASON="feat/breaking in range → X bump (reset Y)"
            else
              Y=$((Y + 1)); REASON="no feat → Y bump (fix/enhancement or no-signal default)"
            fi
            NEXT="${X}.${Y}"
          fi
          SHA=$(git rev-parse --short=7 HEAD)
          echo "AUTO-VERSION  decision=[${REASON}]  range=[${RANGE}]  ->  ${NEXT}+${SHA}  (tag v${NEXT})"
          { echo "## Auto-version"; echo "- ${REASON}"; echo "- **${NEXT}+${SHA}** (tag v${NEXT})"; } >> "$GITHUB_STEP_SUMMARY"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${NEXT}" -m "Release ${NEXT} [auto: ${REASON}]"
          git push origin "v${NEXT}"
